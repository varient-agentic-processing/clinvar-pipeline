# Cloud Workflow: clinvar-refresh
#
# End-to-end ClinVar annotation refresh:
#   1. Download ClinVar files from NCBI to GCS (Cloud Function)
#      - Reads ##fileDate= from VCF header to get the real ClinVar release date
#   2. Compare downloaded version against loaded_version in Firestore
#      - If already up to date, return early
#   3. Load ClinVar VCF into ClickHouse annotations table (Cloud Batch)
#   4. Enrich annotations with variant_summary TSV (Cloud Batch)
#   5. Record completion in Firestore (with loaded_version)
#
# Required args:
#   bucket                GCS bucket name (no gs:// prefix)
#   project_id            GCP project ID
#   clickhouse_host       ClickHouse internal IP (e.g. 10.128.0.3)
#   download_clinvar_url  HTTPS URL of the download-clinvar Cloud Function
#
# Optional args:
#   region                GCP region (default: us-central1)
#   pipeline_version      Version tag written to Firestore (default: v2)
#   clinvar_prefix        GCS prefix for ClinVar files (default: raw/clinvar)
#   stats_service_url     URL of stats-service (if set, POST /stats/compute is called on completion)

main:
  params: [args]
  steps:
    - init:
        assign:
          - bucket: ${args.bucket}
          - project_id: ${args.project_id}
          - clickhouse_host: ${args.clickhouse_host}
          - download_clinvar_url: ${args.download_clinvar_url}
          - region: ${default(map.get(args, "region"), "us-central1")}
          - pipeline_version: ${default(map.get(args, "pipeline_version"), "v2")}
          - clinvar_prefix: ${default(map.get(args, "clinvar_prefix"), "raw/clinvar")}
          - stats_service_url: ${default(map.get(args, "stats_service_url"), "")}
          - job_prefix: ${"clinvar-" + string(int(sys.now()))}
          - pipeline_sa: ${"pipeline-sa@" + project_id + ".iam.gserviceaccount.com"}
          - image_base: ${region + "-docker.pkg.dev/" + project_id + "/genomic-pipeline"}
          - batch_parent: ${"projects/" + project_id + "/locations/" + region}
          - firestore_load_doc: ${"projects/" + project_id + "/databases/(default)/documents/pipeline_runs/clinvar-load"}
          - firestore_enrich_doc: ${"projects/" + project_id + "/databases/(default)/documents/pipeline_runs/clinvar-enrich"}
          - firestore_refresh_doc: ${"projects/" + project_id + "/databases/(default)/documents/pipeline_runs/clinvar-refresh"}
          - load_job_name: "skipped"
          - enrich_job_name: "skipped"

    # -----------------------------------------------------------------------
    # Step 1: Download ClinVar files from NCBI to GCS
    # Always downloads. Reads ##fileDate= from VCF header for actual version.
    # -----------------------------------------------------------------------
    - download:
        call: http.post
        args:
          url: ${download_clinvar_url}
          auth:
            type: OIDC
          timeout: 1800
          body:
            bucket: ${bucket}
            clinvar_prefix: ${clinvar_prefix}
        result: download_result

    # -----------------------------------------------------------------------
    # Step 2: Version check — skip load+enrich if already up to date
    # Reads loaded_version from the clinvar-refresh Firestore doc.
    # If it matches the downloaded VCF version, return early.
    # -----------------------------------------------------------------------
    - check_current_version:
        try:
          call: googleapis.firestore.v1.projects.databases.documents.get
          args:
            name: ${firestore_refresh_doc}
          result: existing_refresh_doc
        except:
          as: e
          steps:
            - handle_version_miss:
                switch:
                  - condition: ${e.code == 404}
                    next: submit_load
            - reraise_version_error:
                raise: ${e}
        next: compare_version

    - compare_version:
        switch:
          - condition: ${map.get(existing_refresh_doc.fields, "loaded_version") != null and existing_refresh_doc.fields.loaded_version.stringValue == download_result.body.version}
            next: already_up_to_date
        next: submit_load

    - already_up_to_date:
        return:
          status: "up_to_date"
          version: ${download_result.body.version}

    # -----------------------------------------------------------------------
    # Step 3: Load ClinVar VCF into ClickHouse annotations table (Cloud Batch)
    # -----------------------------------------------------------------------
    - submit_load:
        call: googleapis.batch.v1.projects.locations.jobs.create
        args:
          parent: ${batch_parent}
          jobId: ${job_prefix + "-load"}
          body:
            taskGroups:
              - taskSpec:
                  runnables:
                    - container:
                        imageUri: ${image_base + "/clinvar-loader:v1"}
                        commands: []
                      environment:
                        variables:
                          BUCKET: ${bucket}
                          CLICKHOUSE_HOST: ${clickhouse_host}
                          CLICKHOUSE_PORT: "9000"
                          GCP_PROJECT: ${project_id}
                          PIPELINE_VERSION: ${pipeline_version}
                          CLINVAR_PREFIX: ${clinvar_prefix}
                  maxRetryCount: 1
                  maxRunDuration: "3600s"
                taskCount: 1
                parallelism: 1
            allocationPolicy:
              instances:
                - policy:
                    machineType: "e2-standard-2"
                    provisioningModel: "STANDARD"
                    bootDisk:
                      type: "pd-standard"
                      sizeGb: 30
              serviceAccount:
                email: ${pipeline_sa}
            logsPolicy:
              destination: CLOUD_LOGGING
        result: load_job

    - poll_load:
        call: sys.sleep
        args:
          seconds: 30

    - get_load_status:
        call: googleapis.batch.v1.projects.locations.jobs.get
        args:
          name: ${load_job.name}
        result: load_status

    - check_load_state:
        switch:
          - condition: ${load_status.status.state == "SUCCEEDED"}
            next: record_load_completion
          - condition: ${load_status.status.state == "FAILED"}
            next: raise_load_failed
        next: poll_load

    - raise_load_failed:
        raise: '${"Load job failed: " + load_job.name}'

    - record_load_completion:
        call: googleapis.firestore.v1.projects.databases.documents.patch
        args:
          name: ${firestore_load_doc}
          body:
            fields:
              type:
                stringValue: clinvar_load
              status:
                stringValue: completed
              pipeline_version:
                stringValue: ${pipeline_version}
              load_job:
                stringValue: ${load_job.name}
              completed_at:
                timestampValue: ${time.format(sys.now())}
        result: _load_firestore_result

    - set_load_job_name:
        assign:
          - load_job_name: ${load_job.name}

    # -----------------------------------------------------------------------
    # Step 4: Enrich annotations with variant_summary TSV (Cloud Batch)
    # -----------------------------------------------------------------------
    - submit_enrich:
        call: googleapis.batch.v1.projects.locations.jobs.create
        args:
          parent: ${batch_parent}
          jobId: ${job_prefix + "-enrich"}
          body:
            taskGroups:
              - taskSpec:
                  runnables:
                    - container:
                        imageUri: ${image_base + "/clinvar-enricher:v1"}
                        commands: []
                      environment:
                        variables:
                          BUCKET: ${bucket}
                          CLICKHOUSE_HOST: ${clickhouse_host}
                          CLICKHOUSE_PORT: "9000"
                          GCP_PROJECT: ${project_id}
                          PIPELINE_VERSION: ${pipeline_version}
                          CLINVAR_PREFIX: ${clinvar_prefix}
                  maxRetryCount: 1
                  maxRunDuration: "3600s"
                taskCount: 1
                parallelism: 1
            allocationPolicy:
              instances:
                - policy:
                    machineType: "e2-standard-2"
                    provisioningModel: "STANDARD"
                    bootDisk:
                      type: "pd-standard"
                      sizeGb: 30
              serviceAccount:
                email: ${pipeline_sa}
            logsPolicy:
              destination: CLOUD_LOGGING
        result: enrich_job

    - poll_enrich:
        call: sys.sleep
        args:
          seconds: 30

    - get_enrich_status:
        call: googleapis.batch.v1.projects.locations.jobs.get
        args:
          name: ${enrich_job.name}
        result: enrich_status

    - check_enrich_state:
        switch:
          - condition: ${enrich_status.status.state == "SUCCEEDED"}
            next: record_enrich_completion
          - condition: ${enrich_status.status.state == "FAILED"}
            next: raise_enrich_failed
        next: poll_enrich

    - raise_enrich_failed:
        raise: '${"Enrich job failed: " + enrich_job.name}'

    - record_enrich_completion:
        call: googleapis.firestore.v1.projects.databases.documents.patch
        args:
          name: ${firestore_enrich_doc}
          body:
            fields:
              type:
                stringValue: clinvar_enrich
              status:
                stringValue: completed
              pipeline_version:
                stringValue: ${pipeline_version}
              enrich_job:
                stringValue: ${enrich_job.name}
              completed_at:
                timestampValue: ${time.format(sys.now())}
        result: _enrich_firestore_result

    - set_enrich_job_name:
        assign:
          - enrich_job_name: ${enrich_job.name}

    # -----------------------------------------------------------------------
    # Step 5: Record overall completion in Firestore
    # Stores loaded_version so future runs can skip if ClinVar hasn't changed.
    # -----------------------------------------------------------------------
    - record_completion:
        call: googleapis.firestore.v1.projects.databases.documents.patch
        args:
          name: ${firestore_refresh_doc}
          body:
            fields:
              type:
                stringValue: clinvar_refresh
              status:
                stringValue: completed
              pipeline_version:
                stringValue: ${pipeline_version}
              loaded_version:
                stringValue: ${download_result.body.version}
              load_job:
                stringValue: ${load_job_name}
              enrich_job:
                stringValue: ${enrich_job_name}
              completed_at:
                timestampValue: ${time.format(sys.now())}
        result: _refresh_firestore_result

    # -----------------------------------------------------------------------
    # Step 6: Trigger stats-service to pre-compute dashboard aggregates
    # Only called if stats_service_url is provided. Failures are non-fatal.
    # -----------------------------------------------------------------------
    - maybe_compute_stats:
        switch:
          - condition: ${stats_service_url != ""}
            next: compute_stats
        next: done

    - compute_stats:
        try:
          call: http.post
          args:
            url: ${stats_service_url + "/stats/compute"}
            auth:
              type: OIDC
            timeout: 300
          result: _stats_result
        except:
          as: e
          steps:
            - log_stats_error:
                call: sys.log
                args:
                  text: ${"stats-service compute failed (non-fatal): " + json.encode_to_string(e)}
                  severity: WARNING

    - done:
        return:
          load_job: ${load_job_name}
          enrich_job: ${enrich_job_name}
          version: ${download_result.body.version}
          status: completed
